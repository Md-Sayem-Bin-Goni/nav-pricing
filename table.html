<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Comparison</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        table {
            width: 700px;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 10px 20px 10px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #d3f6c6;
        }

        .plan-name {
            font-weight: bold;
        }

        .price {
            font-size: 1.2rem;
            color: #4CAF50;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th>Features</th>
        <th>Basic</th>
        <th>Pro</th>
        <th>Premium</th>
    </tr>

    <tr>
        <td class="plan-name">Price</td>
        <td class="price">$9/mo</td>
        <td class="price">$19/mo</td>
        <td class="price">$29/mo</td>
    </tr>

    <tr>
        <td>Storage</td>
        <td>10 GB</td>
        <td>100 GB</td>
        <td>1 TB</td>
    </tr>

    <tr>
        <td>Users</td>
        <td>1</td>
        <td>5</td>
        <td>Unlimited</td>
    </tr>

    <tr>
        <td>Email Support</td>
        <td>✔</td>
        <td>✔</td>
        <td>✔</td>
    </tr>

    <tr>
        <td>Priority Support</td>
        <td>✖</td>
        <td>✔</td>
        <td>✔</td>
    </tr>

    <tr>
        <td>Custom Domain</td>
        <td>✖</td>
        <td>✔</td>
        <td>✔</td>
    </tr>

    <tr>
        <td>Analytics</td>
        <td>Basic</td>
        <td>Advanced</td>
        <td>Advanced + AI</td>
    </tr>
</table>


<a href="tel:+8801234567890" class="call-btn">
    📞 Call Us
</a>

</body>
</html>
